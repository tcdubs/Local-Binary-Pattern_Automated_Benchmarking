data:

  query_images_folder: LBP_Test_Images/WellDefinedTextures_10Rotations_128
  target_images_folder: LBP_Test_Images/WellDefinedTextures_128

rng:
  seed: 42

texture_extraction:
  multi_scale:
    - completed_local_binary_pattern:
        P: 8
        R: 1.0
        method: "ror"
    - completed_local_binary_pattern:
        P: 8
        R: 2.0
        method: "ror"
    - completed_local_binary_pattern:
        P: 8
        R: 3.0
        method: "ror"
    - completed_local_binary_pattern:
        P: 16
        R: 4.0
        method: "ror"
    - completed_local_binary_pattern:
        P: 8
        R: 5.0
        method: "ror"

matching:
  metric: "chi2"
  tolerance: 1
  top: 1


query_image_processing:
  preprocessing:
    gaussian_blur: null
    gaussian_noise: null
    illumination: null
    contrast: null
    
  cropping:
    width: 128
    height: 128
    random_crop: false

  resampling:
    width: null
    height: null
    method: "lanczos"



target_image_processing:
  preprocessing:
    gaussian_blur: null
    gaussian_noise: null
    illumination: null
    contrast: null
    
  cropping:
    width: null
    height: null
    random_crop: false

  resampling:
    width: null
    height: null
    method: "lanczos"

output:
  save_csv: false
  save_pdf: false
  visualize: true
